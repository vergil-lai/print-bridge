name: release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/desktop typecheck
      - run: pnpm --dir apps/desktop lint
      - run: pnpm --dir apps/desktop build

  publish-tauri:
    needs: quality
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage
          - platform: ubuntu-22.04-arm
            args: --target aarch64-unknown-linux-gnu --bundles deb,rpm,appimage
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read release version
        id: release_version
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('apps/desktop/package.json', 'utf8')).version")"
          echo "prerelease=$(node scripts/release-version.mjs prerelease "$VERSION")" >> "$GITHUB_OUTPUT"

      - name: Import Apple Developer certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
        with:
          projectPath: apps/desktop
          tagName: printbridge-v__VERSION__
          releaseName: PrintBridge v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: ${{ steps.release_version.outputs.prerelease }}
          args: ${{ matrix.args }}

      - name: Patch updater download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/patch-updater-json.mjs

  publish-headless:
    needs: publish-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - platform: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            deb_arch: arm64
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install package tools
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Build headless packages
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}
          PACKAGE_ARCH: ${{ matrix.deb_arch }}
        run: scripts/build-server-packages.sh
      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('apps/desktop/package.json', 'utf8')).version")"
          gh release upload "printbridge-v${VERSION}" target/packages/* --clobber

  cleanup-release-signatures:
    needs: [publish-tauri, publish-headless]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Read release tag
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('apps/desktop/package.json', 'utf8')).version")"
          echo "tag=printbridge-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Remove standalone updater signature assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t SIG_ASSETS < <(
            gh release view "${{ steps.release.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name | select(endswith(".sig"))'
          )

          if [ "${#SIG_ASSETS[@]}" -eq 0 ]; then
            echo "No standalone .sig release assets found."
            exit 0
          fi

          for ASSET in "${SIG_ASSETS[@]}"; do
            echo "Deleting release asset: ${ASSET}"
            gh release delete-asset "${{ steps.release.outputs.tag }}" "${ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes
          done
